<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Privado Elisa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Garante que o corpo ocupe 100% da altura visível */
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: #e5ddd5; display: flex; flex-direction: column; }

        /* TELA DE BLOQUEIO */
        #tela-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #075e54; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        #tela-login input { padding: 15px; border-radius: 10px; border: none; width: 80%; margin-top: 20px; text-align: center; font-size: 18px; }
        #tela-login button { margin-top: 15px; padding: 12px 30px; border-radius: 10px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; }

        /* ESTRUTURA PRINCIPAL */
        #main-chat { display: none; flex-direction: column; height: 100%; width: 100%; }

        header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; min-height: 60px; z-index: 10; }
        
        /* ÁREA DE MENSAGENS COM SCROLL */
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-attachment: fixed;
            -webkit-overflow-scrolling: touch;
        }

        .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.15); line-height: 1.4; position: relative; }
        .outra-msg { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .minha-msg { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .sender-name { font-size: 11px; font-weight: bold; color: #34b7f1; display: block; margin-bottom: 3px; }

        /* RODAPÉ CORRIGIDO PARA APARECER SEMPRE */
        footer { 
            background: #f0f0f0; 
            padding: 10px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            min-height: 60px;
            border-top: 1px solid #ddd;
        }
        .input-wrapper { background: white; flex: 1; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        input#msgInput { flex: 1; border: none; padding: 10px; outline: none; font-size: 16px; background: transparent; }
        .btn-send { background: #008069; color: white; width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="tela-login">
        <i class="fas fa-lock" style="font-size: 60px;"></i>
        <h2 style="margin-top: 15px;">Acesso Restrito</h2>
        <input type="password" id="chaveAcesso" placeholder="Senha do Chat">
        <button onclick="verificarAcesso()">ENTRAR</button>
        <p id="erro" style="color: #ff9999; margin-top: 15px; display: none;">Senha incorreta!</p>
    </div>

    <div id="main-chat">
        <header>
            <div style="width: 35px; height: 35px; background: #4ec3f7; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-user-friends" style="color: white; font-size: 14px;"></i>
            </div>
            <div>
                <h3 style="font-size: 16px;">Chat Elisa</h3>
                <small style="opacity: 0.8;">privado</small>
            </div>
        </header>

        <div id="chat-container"></div>

        <footer>
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="Mensagem">
            </div>
            <button class="btn-send" onclick="enviarMensagem()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const SENHA_MESTRE = "20062008"; 
        const firebaseConfig = { 
            databaseURL: "https://elisa-7b09f-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function verificarAcesso() {
            const senhaDigitada = document.getElementById('chaveAcesso').value;
            if (senhaDigitada === SENHA_MESTRE) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('main-chat').style.display = 'flex';
                iniciarConexao();
            } else {
                document.getElementById('erro').style.display = 'block';
            }
        }

        function iniciarConexao() {
            let meuNome = localStorage.getItem('chat_elisa_nome');
            if (!meuNome) {
                meuNome = prompt("Seu Nome:") || "Amigo";
                localStorage.setItem('chat_elisa_nome', meuNome);
            }

            database.ref('mensagens').limitToLast(50).on('child_added', (snapshot) => {
                const data = snapshot.val();
                const eMinha = data.nome === meuNome;
                const div = document.createElement('div');
                div.className = `msg ${eMinha ? 'minha-msg' : 'outra-msg'}`;
                div.innerHTML = `${!eMinha ? `<span class="sender-name">${data.nome}</span>` : ''}${data.texto}`;
                document.getElementById('chat-container').appendChild(div);
                document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
            });

            window.enviarMensagem = function() {
                const campo = document.getElementById('msgInput');
                if (campo.value.trim() !== "") {
                    database.ref('mensagens').push({ nome: meuNome, texto: campo.value });
                    campo.value = "";
                }
            };
        }
    </script>
</body>
</html>
